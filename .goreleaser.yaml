version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: default
    binary: jwt-spoa
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goarch:
      - amd64
      - arm64
    goos:
      - linux
    main: ./cmd/jwt-spoa
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -X main.Version={{ .Version }}

archives:
  - ids:
      - default
    allow_different_binary_count: true
    formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  use: github-native

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  make_latest: true
  replace_existing_artifacts: true
  prerelease: auto

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

sboms:
  - id: package
    artifacts: package
    disable: false
  - artifacts: archive
    disable: false

nfpms:
  - ids:
      - default
    homepage: https://github.com/andrewheberle/jwt-spoa
    maintainer: Andrew Heberle <andrew.heberle@gmail.com>
    description: |-
      A Stream Processing Offload Agent (SPOE) that handles JWT verification
      and claim extraction for HAProxy.
    license: Apache 2.0
    formats:
      - deb
    contents:
      - src: systemd/
        dst: /usr/lib/systemd/system
    mtime: "{{ .CommitDate }}"

gomod:
  proxy: true

dockers_v2:
  - images:
      - "ghcr.io/andrewheberle/jwt-spoa"
    ids:
      - default
    tags:
      - "v{{ .Version }}"
      - "{{ if not .IsSnapshot }}latest{{ end }}"
    sbom: true
    disable: false
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.description": "A SPOA service to verify JWT's for HAProxy"
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.name": "{{ .ProjectName }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
    annotations:
      "org.opencontainers.image.description": "A SPOA service to verify JWT's for HAProxy"

docker_digest:
  name_template: "digests.txt"

docker_signs:
  - cmd: cosign
    output: true
    args:
      - "sign"
      - "${artifact}@${digest}"
      - "--yes"
